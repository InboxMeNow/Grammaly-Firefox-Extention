<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grammaly Test Page</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f4f7fa;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 20px;
        color: #516171;
      }

      .sample {
        margin: 20px 0;
        padding: 14px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #ffffff;
        color: #17202a;
        line-height: 1.65;
      }

      label {
        display: grid;
        gap: 8px;
        margin: 18px 0;
        font-weight: 700;
      }

      textarea,
      input,
      [contenteditable] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c8d3de;
        border-radius: 8px;
        background: #ffffff;
        color: #17202a;
        font: inherit;
        font-weight: 500;
      }

      textarea {
        min-height: 180px;
        padding: 12px;
        resize: vertical;
      }

      input {
        min-height: 42px;
        padding: 8px 12px;
      }

      [contenteditable] {
        min-height: 120px;
        padding: 12px;
      }

      textarea:focus,
      input:focus,
      [contenteditable]:focus {
        border-color: #1f846a;
        outline: 3px solid rgba(31, 132, 106, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Grammaly Test Page</h1>
      <p>Select a passage, click the floating Grammaly icon, then hover red underlined mistakes.</p>

      <div class="sample">
        I has a importent meeting tomorow and I need to writed a professional emails.
        My friend go to the office yesterday and she forgeted her laptop.
      </div>

      <label>
        Textarea
        <textarea>I has a importent meeting tomorow and I need to writed a professional emails.</textarea>
      </label>

      <label>
        Input
        <input value="This sentense have a speling mistake.">
      </label>

      <label>
        Contenteditable
        <div contenteditable="true">My friend go to the office yesterday and she forgeted her laptop.</div>
      </label>
    </main>
  </body>
</html>
